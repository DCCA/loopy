id: test-impact-budget

trigger:
  type: schedule
  cron: "0 7 * * 1" # weekly, Mondays 07:00 UTC

guardrails:
  pathAllowlist:
    - "reports/**"
  maxFiles: 5
  skipIfOpenPr: true

config:
  reportPath: "reports/test-impact.md"
  # Fractional growth over the rolling baseline before a test regresses, and the
  # EWMA smoothing factor that rolls the baseline forward each run.
  growthThreshold: 0.5
  alpha: 0.3
