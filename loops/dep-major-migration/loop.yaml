id: dep-major-migration

trigger:
  type: schedule
  cron: "0 6 * * 1" # weekly, Mondays 06:00 UTC

guardrails:
  pathAllowlist:
    - "package.json"
  maxFiles: 1
  skipIfOpenPr: true

config:
  # The single major bump this run migrates. Majors are handled one-at-a-time.
  pkg: "left-pad"
  fromVersion: "1.3.0"
  toVersion: "2.0.0"
  manifestPath: "package.json"
