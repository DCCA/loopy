id: metric-anomaly

trigger:
  type: schedule
  cron: "0 7 * * *" # daily, 07:00 UTC

guardrails:
  pathAllowlist:
    - "reports/**"
  maxFiles: 5
  skipIfOpenPr: true

config:
  reportPath: "reports/anomalies.md"
  # z-score magnitude at/above which a series' latest point is anomalous.
  zThreshold: 3
